<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <!-- Definitions for gradients and styles -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    
    <!-- Accent Gradient Cyan-Purple -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    
    <!-- Glowing Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="15" fill="url(#bgGrad)" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Decorative Shapes / Glowing Orbs -->
  <circle cx="750" cy="50" r="100" fill="#00f2fe" opacity="0.05" filter="url(#glow)"/>
  <circle cx="50" cy="200" r="80" fill="#4facfe" opacity="0.05" filter="url(#glow)"/>

  <!-- Glowing Line Accent on Top -->
  <rect x="0" y="0" width="800" height="4" fill="url(#accentGrad)"/>

  <!-- Brand/Title Text -->
  <text x="50" y="90" fill="url(#accentGrad)" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="34" letter-spacing="1.5">TENGKU AHMAD DANIAL</text>
  <text x="50" y="125" fill="#e2e8f0" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="600" font-size="18" letter-spacing="0.5">Software Developer &amp; IT Graduate</text>

  <!-- Bio Highlights / Sub-labels -->
  <text x="50" y="165" fill="#94a3b8" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="500" font-size="14">🎓 Bachelor in Information Tech | Diploma in Computer Science</text>
  <text x="50" y="190" fill="#94a3b8" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="500" font-size="14">💻 Java • JavaScript • PHP • Python • Android Development</text>
  
  <!-- Right decorative pattern (terminal mock) -->
  <g transform="translate(560, 50)" opacity="0.8">
    <rect width="190" height="150" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="190" y2="30" stroke="#1e293b" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="4" fill="#ef4444"/>
    <circle cx="30" cy="15" r="4" fill="#f59e0b"/>
    <circle cx="45" cy="15" r="4" fill="#10b981"/>
    
    <text x="20" y="60" fill="#38bdf8" font-family="monospace" font-size="12">&gt; const dev = {</text>
    <text x="35" y="80" fill="#f43f5e" font-family="monospace" font-size="12">name: <tspan fill="#10b981">'Danial'</tspan>,</text>
    <text x="35" y="100" fill="#f43f5e" font-family="monospace" font-size="12">role: <tspan fill="#10b981">'Developer'</tspan>,</text>
    <text x="35" y="120" fill="#f43f5e" font-family="monospace" font-size="12">status: <tspan fill="#10b981">'Building'</tspan></text>
    <text x="20" y="140" fill="#38bdf8" font-family="monospace" font-size="12">};</text>
  </g>
</svg>
